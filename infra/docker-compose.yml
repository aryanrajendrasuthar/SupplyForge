name: supplyforge

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?set MSSQL_SA_PASSWORD in .env}"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_ROOT_USER:-root}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_ROOT_PASSWORD:?set MONGO_ROOT_PASSWORD in .env}"
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  # SQL Server doesn't auto-create a database on first connection the way
  # SQLite/Mongo do — this runs once to provision each service's database,
  # then exits. Services depend on it completing, not just sqlserver being
  # healthy (a live connection still 18456s if the target DB doesn't exist).
  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        /opt/mssql-tools18/bin/sqlcmd -C -S sqlserver -U sa -P "$$MSSQL_SA_PASSWORD" -Q "
        IF DB_ID('catalog_service') IS NULL CREATE DATABASE catalog_service;
        IF DB_ID('inventory_service') IS NULL CREATE DATABASE inventory_service;
        IF DB_ID('supplier_service') IS NULL CREATE DATABASE supplier_service;
        IF DB_ID('order_service') IS NULL CREATE DATABASE order_service;
        "
    environment:
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?set MSSQL_SA_PASSWORD in .env}"
    depends_on:
      sqlserver:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}"]
    ports:
      - "6380:6379"  # host 6380 to avoid clashing with a locally-installed Redis on 6379
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # SQS-API-compatible queue for local dev; swap for real AWS SQS in production
  # by pointing the SDK endpoint at AWS instead of this container.
  elasticmq:
    image: softwaremill/elasticmq-native:1.5.7
    ports:
      - "9324:9324"  # SQS API
      - "9325:9325"  # web UI
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf:ro

  catalog-service:
    build:
      context: ../services/catalog-service
    environment:
      DATABASE_URL: "mssql+pymssql://sa:${MSSQL_SA_PASSWORD}@sqlserver:1433/catalog_service"
      SQS_ENDPOINT_URL: "http://elasticmq:9324"
      PRICING_QUEUE_URL: "http://elasticmq:9324/000000000000/pricing-invalidation-queue"
      CORS_ORIGINS: '["http://localhost:5173"]'
    ports:
      - "5004:5004"
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
      elasticmq:
        condition: service_started

  inventory-service:
    build:
      context: ../services/inventory-service
    environment:
      DATABASE_URL: "mssql+pymssql://sa:${MSSQL_SA_PASSWORD}@sqlserver:1433/inventory_service"
      SQS_ENDPOINT_URL: "http://elasticmq:9324"
      RESERVATION_QUEUE_URL: "http://elasticmq:9324/000000000000/inventory-reservation-queue"
      ORDER_STATUS_QUEUE_URL: "http://elasticmq:9324/000000000000/order-status-queue"
      CORS_ORIGINS: '["http://localhost:5173"]'
    ports:
      - "5005:5005"
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
      elasticmq:
        condition: service_started

  # Saga consumer: reserves stock for order.created events, publishes the
  # result back to order-status-queue. Same image as inventory-service, just
  # running the polling loop instead of gunicorn.
  inventory-service-consumer:
    build:
      context: ../services/inventory-service
    command: ["python", "-m", "app.consumer"]
    environment:
      DATABASE_URL: "mssql+pymssql://sa:${MSSQL_SA_PASSWORD}@sqlserver:1433/inventory_service"
      SQS_ENDPOINT_URL: "http://elasticmq:9324"
      RESERVATION_QUEUE_URL: "http://elasticmq:9324/000000000000/inventory-reservation-queue"
      ORDER_STATUS_QUEUE_URL: "http://elasticmq:9324/000000000000/order-status-queue"
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
      elasticmq:
        condition: service_started

  supplier-service:
    build:
      context: ../services/supplier-service
    environment:
      DATABASE_URL: "mssql+pymssql://sa:${MSSQL_SA_PASSWORD}@sqlserver:1433/supplier_service"
      CORS_ORIGINS: '["http://localhost:5173"]'
    ports:
      - "5001:5001"
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully

  order-service:
    build:
      context: ../services/order-service
    environment:
      DATABASE_URL: "mssql+pymssql://sa:${MSSQL_SA_PASSWORD}@sqlserver:1433/order_service"
      SQS_ENDPOINT_URL: "http://elasticmq:9324"
      RESERVATION_QUEUE_URL: "http://elasticmq:9324/000000000000/inventory-reservation-queue"
      ORDER_STATUS_QUEUE_URL: "http://elasticmq:9324/000000000000/order-status-queue"
      CORS_ORIGINS: '["http://localhost:5173"]'
    ports:
      - "5002:5002"
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
      elasticmq:
        condition: service_started

  # Saga consumer: applies inventory.reserved / inventory.reservation_failed
  # events to the matching order. Same image as order-service, just running
  # the polling loop instead of gunicorn.
  order-service-consumer:
    build:
      context: ../services/order-service
    command: ["python", "-m", "app.consumer"]
    environment:
      DATABASE_URL: "mssql+pymssql://sa:${MSSQL_SA_PASSWORD}@sqlserver:1433/order_service"
      SQS_ENDPOINT_URL: "http://elasticmq:9324"
      RESERVATION_QUEUE_URL: "http://elasticmq:9324/000000000000/inventory-reservation-queue"
      ORDER_STATUS_QUEUE_URL: "http://elasticmq:9324/000000000000/order-status-queue"
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
      elasticmq:
        condition: service_started

  ingestion-service:
    build:
      context: ../services/ingestion-service
    environment:
      MONGO_URL: "mongodb://${MONGO_ROOT_USER:-root}:${MONGO_ROOT_PASSWORD}@mongodb:27017"
      SQS_ENDPOINT_URL: "http://elasticmq:9324"
      AI_VALIDATION_QUEUE_URL: "http://elasticmq:9324/000000000000/ai-validation-queue"
      VALIDATION_RESULT_QUEUE_URL: "http://elasticmq:9324/000000000000/validation-result-queue"
      CORS_ORIGINS: '["http://localhost:5173"]'
    ports:
      - "5003:5003"
    depends_on:
      mongodb:
        condition: service_healthy
      elasticmq:
        condition: service_started

  # Applies validation.completed events (from ai-validation-worker) back onto
  # their record. Same image as ingestion-service, running the polling loop.
  ingestion-service-consumer:
    build:
      context: ../services/ingestion-service
    command: ["python", "-m", "app.consumer"]
    environment:
      MONGO_URL: "mongodb://${MONGO_ROOT_USER:-root}:${MONGO_ROOT_PASSWORD}@mongodb:27017"
      SQS_ENDPOINT_URL: "http://elasticmq:9324"
      AI_VALIDATION_QUEUE_URL: "http://elasticmq:9324/000000000000/ai-validation-queue"
      VALIDATION_RESULT_QUEUE_URL: "http://elasticmq:9324/000000000000/validation-result-queue"
    depends_on:
      mongodb:
        condition: service_healthy
      elasticmq:
        condition: service_started

  ai-validation-worker:
    build:
      context: ../services/ai-validation-worker
    environment:
      SQS_ENDPOINT_URL: "http://elasticmq:9324"
      AI_VALIDATION_QUEUE_URL: "http://elasticmq:9324/000000000000/ai-validation-queue"
      VALIDATION_RESULT_QUEUE_URL: "http://elasticmq:9324/000000000000/validation-result-queue"
      GROQ_API_KEY: "${GROQ_API_KEY:-}"
    depends_on:
      elasticmq:
        condition: service_started

  graphql-gateway:
    build:
      context: ../gateway/graphql-gateway
    environment:
      CATALOG_SERVICE_URL: "http://catalog-service:5004"
      INVENTORY_SERVICE_URL: "http://inventory-service:5005"
      SUPPLIER_SERVICE_URL: "http://supplier-service:5001"
      ORDER_SERVICE_URL: "http://order-service:5002"
      CORS_ORIGINS: '["http://localhost:5173"]'
    ports:
      - "5050:5000"  # host 5050 — macOS AirPlay Receiver squats on 5000 by default
    depends_on:
      - catalog-service
      - inventory-service
      - supplier-service
      - order-service

volumes:
  sqlserver-data:
  mongodb-data:
