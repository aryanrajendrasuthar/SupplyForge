name: supplyforge

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?set MSSQL_SA_PASSWORD in .env}"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_ROOT_USER:-root}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_ROOT_PASSWORD:?set MONGO_ROOT_PASSWORD in .env}"
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # SQS-API-compatible queue for local dev; swap for real AWS SQS in production
  # by pointing the SDK endpoint at AWS instead of this container.
  elasticmq:
    image: softwaremill/elasticmq-native:1.5.7
    ports:
      - "9324:9324"  # SQS API
      - "9325:9325"  # web UI
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf:ro

volumes:
  sqlserver-data:
  mongodb-data:
