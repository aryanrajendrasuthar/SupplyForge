include classpath("application.conf")

node-address {
  protocol = http
  host = "*"
  port = 9324
  context-path = ""
}

rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0"
  sqs-limits = strict
}

queues {
  inventory-reservation-queue {
    # consumed by inventory-service, produced by order-service (order.created)
  }
  order-status-queue {
    # consumed by order-service, produced by inventory-service (inventory.reserved / .reservation_failed)
  }
  pricing-invalidation-queue {
    # consumed by graphql-gateway cache, produced by catalog-service (pricing.updated)
  }
  ai-validation-queue {
    # consumed by ai-validation-worker, produced by ingestion-service
    deadLettersQueue {
      name = "ai-validation-dlq"
      maxReceiveCount = 3
    }
  }
  ai-validation-dlq { }
  validation-result-queue {
    # consumed by ingestion-service, produced by ai-validation-worker
    # (validation.completed) — writes the verdict back onto the record
  }
}
