name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-services:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - shared/auth
          - services/supplier-service
          - services/catalog-service
          - services/inventory-service
          - services/order-service
          - services/ingestion-service
          - services/ai-validation-worker
          - gateway/graphql-gateway
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then
            pip install -e ".[dev]"
          else
            pip install -r requirements.txt
          fi

      - name: Run tests
        run: pytest -q

      - name: Dependency audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/dashboard
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/dashboard/package-lock.json

      - run: npm ci
      - run: npm run build

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@8708801319700a16c56abb86628803ba766d5563 # main
        with:
          extra_args: --results=verified,unknown

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep scan --config auto --error
